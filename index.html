<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Home Clone</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{background:#0f1116;color:#fff;}

/* TOPBAR */
.topbar{
 height:64px;
 background:#111318;
 display:flex;
 align-items:center;
 padding:0 20px;
 border-bottom:1px solid #1f2229;
}
.logo{font-weight:900;font-size:22px;margin-right:20px;}
.menu{display:flex;gap:25px;color:#ccc;}

.search-wrap{flex:1;display:flex;justify-content:center;}
.search{
 width:420px;
 padding:10px;
 border-radius:10px;
 border:none;
 background:#1c1f26;
 color:white;
}

.top-right{
 display:flex;
 align-items:center;
 gap:15px;
}
.icon{
 width:30px;height:30px;
 background:#1c1f26;
 border-radius:50%;
 cursor:pointer;
 position:relative;
}
.badge{
 position:absolute;
 top:-5px;right:-5px;
 background:red;
 font-size:11px;
 padding:2px 6px;
 border-radius:20px;
}
.username{font-size:14px;}

/* LAYOUT */
.container{display:flex;}

/* SIDEBAR */
.sidebar{
 width:250px;
 background:#0c0e13;
 padding:20px;
 height:calc(100vh - 64px);
}
.nav-item{
 padding:12px;
 border-radius:10px;
 margin-bottom:6px;
 color:#ccc;
 display:flex;
 justify-content:space-between;
}
.nav-item:hover,.active{background:#1c1f26;color:white;}
.count{
 background:#2a2d36;
 padding:2px 8px;
 border-radius:12px;
 font-size:12px;
}

/* MAIN */
.main{flex:1;padding:30px;}

.friends{
 display:flex;
 gap:15px;
 margin:20px 0 40px;
}
.avatar{
 width:75px;height:75px;
 border-radius:50%;
 background:#00ff88;
}
.add{
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:30px;
 background:#1c1f26;
}

/* CARDS */
.cards{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:20px;
}
.card{
 background:#1c1f26;
 border-radius:12px;
 overflow:hidden;
}
.card-img{height:170px;background:#00ff88;}
.card-content{padding:12px;}
.card-title{font-weight:bold;}
.card-desc{color:#aaa;font-size:14px;}

.sub{color:#aaa;font-size:14px;}
</style>
</head>

<body>

<div class="topbar">
 <div class="logo">ROBLOX</div>

 <div class="menu">
  <div>Charts</div>
  <div>Marketplace</div>
  <div>Create</div>
  <div>Robux</div>
 </div>

 <div class="search-wrap">
  <input class="search" placeholder="Search">
 </div>

 <div class="top-right">
  <div class="username">AssaultRifleBwai</div>

  <div class="icon">
   <div class="badge">28</div>
  </div>

  <div class="icon"></div>

  <!-- SETTINGS BUTTON -->
  <div class="icon" id="settingsBtn"></div>
 </div>
</div>

<div class="container">

 <div class="sidebar">
  <div class="nav-item active">Home</div>
  <div class="nav-item">Profile</div>
  <div class="nav-item">Messages <span class="count">10</span></div>
  <div class="nav-item">Friends <span class="count">500</span></div>
  <div class="nav-item">Avatar</div>
  <div class="nav-item">Inventory</div>
 </div>

 <div class="main">
  <h1>Home</h1>

  <div class="sub">Friends (237)</div>
  <div class="friends">
   <div class="avatar add">+</div>
   <div class="avatar"></div>
   <div class="avatar"></div>
   <div class="avatar"></div>
   <div class="avatar"></div>
  </div>

  <div class="sub">Standout Games</div>
  <div class="cards">
   <div class="card">
    <div class="card-img"></div>
    <div class="card-content">
     <div class="card-title">The Block</div>
     <div class="card-desc">Events and concerts</div>
    </div>
   </div>

   <div class="card">
    <div class="card-img"></div>
    <div class="card-content">
     <div class="card-title">Dress To Impress</div>
     <div class="card-desc">Become the top model</div>
    </div>
   </div>

   <div class="card">
    <div class="card-img"></div>
    <div class="card-content">
     <div class="card-title">KPop Demon Hunters</div>
     <div class="card-desc">Protect the fans</div>
    </div>
   </div>

   <div class="card">
    <div class="card-img"></div>
    <div class="card-content">
     <div class="card-title">Winx</div>
     <div class="card-desc">Magic adventure</div>
    </div>
   </div>
  </div>
 </div>

</div>

<script>
document.getElementById("settingsBtn").onclick = function() {
    window.location.href = "login.html";
};
</script>

</body>
</html>
