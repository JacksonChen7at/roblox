<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaPlay - Home</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0e1014;
  color: white;
}

/* TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  background: #181b22;
  padding: 10px 20px;
}

.menu a {
  font-size: 19px;
  color: #bbb;
  text-decoration: none;
  margin-right: 15px;
}

.menu a:hover { color: white; }

/* CARDS */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1f2430;
  padding: 10px;
  border-radius: 12px;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 15px #00d4ff55;
}

.thumb {
  height: 100px;
  background: #444;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu">
    <a href="index.html">Home</a>
    <a href="charts.html">Charts</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="create.html">Create</a>
  </div>
</div>

<h2 style="padding:20px;">▶ Continue Playing</h2>
<div class="games">
  <div class="card"><div class="thumb"></div>Tower Rush</div>
  <div class="card"><div class="thumb"></div>Sky Wars</div>
</div>

<h2 style="padding:20px;">🔥 Popular Games</h2>
<div class="games">
  <div class="card"><div class="thumb"></div>Block Survival</div>
  <div class="card"><div class="thumb"></div>Speed Run X</div>
  <div class="card"><div class="thumb"></div>Neon City</div>
</div>

</body>
</html>
