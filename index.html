<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaPlay</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e1014;
  color: white;
}

/* Top Bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #181b22;
  padding: 10px 20px;
}

/* Left section */
.left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.currency {
  background: #222733;
  padding: 6px 12px;
  border-radius: 8px;
}

/* Menu */
.menu {
  display: flex;
  gap: 20px;
}

.menu div {
  cursor: pointer;
  color: #bbb;
}

.menu div:hover {
  color: white;
}

/* Content */
.container {
  padding: 20px;
}

.section-title {
  font-size: 18px;
  margin-bottom: 10px;
}

/* Game Grid */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #1f2430;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #00d4ff55;
}

.thumb {
  height: 100px;
  border-radius: 8px;
  background: linear-gradient(45deg, #444, #777);
  margin-bottom: 10px;
}

.title {
  font-size: 14px;
  font-weight: bold;
}

/* Marketplace */
.market {
  margin-top: 30px;
  display: flex;
  gap: 15px;
}

.item {
  background: #1f2430;
  padding: 10px;
  border-radius: 10px;
  width: 120px;
  text-align: center;
}

.price {
  color: #00d4ff;
  margin-top: 5px;
}

</style>
</head>

<body>

<!-- Top -->
<div class="topbar">
  
  <div class="left">
    <div class="logo">🚀 NovaPlay</div>
    <div class="currency">⍟ 1,250 NovaCoins</div>
  </div>

  <div class="menu">
    <div>Charts</div>
    <div>Marketplace</div>
    <div>Create</div>
  </div>

</div>

<!-- Content -->
<div class="container">

  <div class="section-title">🔥 Popular Games</div>
  <div class="games">
    <div class="card"><div class="thumb"></div><div class="title">Tower Rush</div></div>
    <div class="card"><div class="thumb"></div><div class="title">Block Survival</div></div>
    <div class="card"><div class="thumb"></div><div class="title">Speed Run X</div></div>
    <div class="card"><div class="thumb"></div><div class="title">Sky Wars</div></div>
  </div>

  <div class="section-title">🛒 Marketplace</div>
  <div class="market">
    <div class="item">
      <div class="thumb"></div>
      Cool Hat
      <div class="price">⍟ 250</div>
    </div>

    <div class="item">
      <div class="thumb"></div>
      Epic Sword
      <div class="price">⍟ 500</div>
    </div>

    <div class="item">
      <div class="thumb"></div>
      Neon Wings
      <div class="price">⍟ 900</div>
    </div>
  </div>

</div>

<script>
document.querySelectorAll(".card").forEach(card => {
  card.onclick = () => {
    alert("Launching game...");
  };
});
</script>

</body>
</html>
