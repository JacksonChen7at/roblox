<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox UI Clone</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1116;
    color: white;
}

/* Top Bar */
.topbar {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    background: #111318;
    border-bottom: 1px solid #222;
}

.logo {
    font-weight: bold;
    font-size: 22px;
    margin-right: 20px;
}

.top-links {
    display: flex;
    gap: 20px;
    color: #ccc;
}

.search {
    margin-left: auto;
    padding: 6px 10px;
    background: #1c1f26;
    border-radius: 6px;
    border: none;
    color: white;
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #0c0e13;
    height: 100vh;
    padding: 15px;
    box-sizing: border-box;
}

.sidebar h3 {
    margin-bottom: 20px;
}

.nav-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    color: #ccc;
}

.nav-item:hover, .nav-item.active {
    background: #1c1f26;
    color: white;
}

/* Main Content */
.main {
    flex: 1;
    padding: 20px;
}

/* Friends Row */
.friends {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    margin-bottom: 30px;
}

.friend {
    text-align: center;
}

.friend img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1c1f26;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.card .info {
    padding: 10px;
}

.subtitle {
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">ROBLOX</div>
    <div class="top-links">
        <div>Charts</div>
        <div>Marketplace</div>
        <div>Create</div>
        <div>Robux</div>
    </div>
    <input class="search" placeholder="Search">
</div>

<div class="container">

    <div class="sidebar">
        <h3>AssaultRifleBwai</h3>
        <div class="nav-item active">Home</div>
        <div class="nav-item">Profile</div>
        <div class="nav-item">Messages</div>
        <div class="nav-item">Friends</div>
        <div class="nav-item">Avatar</div>
        <div class="nav-item">Inventory</div>
        <div class="nav-item">Trade</div>
    </div>

    <div class="main">
        <h1>Home</h1>

        <h3>Friends</h3>
        <div class="friends" id="friends"></div>

        <h3>Standout Games</h3>
        <div class="cards" id="games"></div>
    </div>

</div>

<script>
// Fake data
const friends = [
    "https://i.pravatar.cc/100?img=1",
    "https://i.pravatar.cc/100?img=2",
    "https://i.pravatar.cc/100?img=3",
    "https://i.pravatar.cc/100?img=4",
    "https://i.pravatar.cc/100?img=5"
];

const games = [
    {title:"The Block", desc:"Events, concerts and more!", img:"https://picsum.photos/400/200?1"},
    {title:"Dress To Impress", desc:"Become the top model", img:"https://picsum.photos/400/200?2"},
    {title:"KPop Demon Hunters", desc:"Protect the fans", img:"https://picsum.photos/400/200?3"},
    {title:"Winx", desc:"Step into the magic", img:"https://picsum.photos/400/200?4"}
];

// Render Friends
const friendContainer = document.getElementById("friends");
friends.forEach(src => {
    const div = document.createElement("div");
    div.className = "friend";
    div.innerHTML = `<img src="${src}"><div>Friend</div>`;
    friendContainer.appendChild(div);
});

// Render Games
const gameContainer = document.getElementById("games");
games.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
        <img src="${game.img}">
        <div class="info">
            <strong>${game.title}</strong>
            <div class="subtitle">${game.desc}</div>
        </div>
    `;
    gameContainer.appendChild(div);
});
</script>

</body>
</html>
