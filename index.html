<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaPlay</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e1014;
  color: white;
}

/* Top Bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #181b22;
  padding: 10px 20px;
}

/* Left menu */
.menu {
  display: flex;
  gap: 22px;
  align-items: center;
}

/* ALL menu items same size */
.menu div {
  font-size: 15px;
  cursor: pointer;
  color: #bbb;
}

.menu div:hover {
  color: white;
}

/* NC button same size style */
.nc-btn {
  font-size: 15px;
  cursor: pointer;
  color: #00d4ff;
  font-weight: bold;
}

.nc-btn:hover {
  color: #66e6ff;
}

/* CENTER LOGO */
.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}

.logo:hover {
  color: #00d4ff;
}

/* Right balance */
.balance {
  background: #222733;
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: bold;
}

/* Content */
.container {
  padding: 20px;
}

.section-title {
  font-size: 18px;
  margin-bottom: 10px;
}

/* Games */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #1f2430;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #00d4ff55;
}

.thumb {
  height: 100px;
  border-radius: 8px;
  background: linear-gradient(45deg, #444, #777);
  margin-bottom: 10px;
}

.title {
  font-size: 14px;
  font-weight: bold;
}

/* Marketplace */
.market {
  margin-top: 30px;
  display: flex;
  gap: 15px;
}

.item {
  background: #1f2430;
  padding: 10px;
  border-radius: 10px;
  width: 120px;
  text-align: center;
}

.price {
  color: #00d4ff;
  margin-top: 5px;
}

</style>
</head>

<body>

<!-- Top Bar -->
<div class="topbar">

  <!-- LEFT MENU -->
  <div class="menu">
    <div>Charts</div>
    <div>Marketplace</div>
    <div>Create</div>
    <div class="nc-btn">NC (CMCN)</div>
  </div>

  <!-- CENTER LOGO -->
  <div class="logo" onclick="goHome()">🚀 NovaPlay</div>

  <!-- RIGHT -->
  <div class="balance">⍟ 1,250</div>

</div>

<!-- CONTENT -->
<div class="container">

  <div class="section-title">🔥 Popular Games</div>

  <div class="games">
    <div class="card"><div class="thumb"></div><div class="title">Tower Rush</div></div>
    <div class="card"><div class="thumb"></div><div class="title">Block Survival</div></div>
    <div class="card"><div class="thumb"></div><div class="title">Speed Run X</div></div>
    <div class="card"><div class="thumb"></div><div class="title">Sky Wars</div></div>
  </div>

  <div class="section-title">🛒 Marketplace</div>

  <div class="market">
    <div class="item">
      <div class="thumb"></div>
      Cool Hat
      <div class="price">⍟ 250</div>
    </div>

    <div class="item">
      <div class="thumb"></div>
      Epic Sword
      <div class="price">⍟ 500</div>
    </div>

    <div class="item">
      <div class="thumb"></div>
      Neon Wings
      <div class="price">⍟ 900</div>
    </div>
  </div>

</div>

<script>
document.querySelectorAll(".card").forEach(card => {
  card.onclick = () => alert("Launching game...");
});

function goHome() {
  location.reload();
}
</script>

</body>
</html>
